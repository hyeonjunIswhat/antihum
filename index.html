<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AntiHum — 소음 완화</title>
<link rel="stylesheet" href="./style.css">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0f13">
</head>
<body>

<div class="brand">
  <h1>ANTI<b>HUM</b></h1>
  <span class="tagline">에어컨 소음 완화</span>
</div>
<div class="status" id="status">방 소음을 3초 듣고, 그 결에 맞춰 조용하게 만듭니다</div>

<div class="ring-wrap">
  <div class="ring" id="ring">
    <svg viewBox="0 0 230 230">
      <circle class="track" cx="115" cy="115" r="105"/>
      <circle class="glow" id="glowArc" cx="115" cy="115" r="105"/>
    </svg>
    <div class="dot" id="ringDot"></div>
    <div class="ring-center">
      <div class="freq" id="freq">—</div>
      <div class="flabel" id="flabel">READY</div>
      <div class="phase" id="phaseRO"></div>
    </div>
  </div>
</div>

<div class="stage" id="stage"></div>

<button id="tapBtn">🔇 지금 조용함</button>

<div class="mask-ctrl" id="maskCtrl">
  <div class="row"><span>마스킹 세기</span><b id="lvlRO">50%</b></div>
  <input type="range" id="lvl" min="0" max="1" step="0.01" value="0.5">
  <div class="chips">
    <button class="chip sel" data-min="0">무제한</button>
    <button class="chip" data-min="30">30분</button>
    <button class="chip" data-min="60">60분</button>
    <button class="chip" data-min="90">90분</button>
  </div>
</div>

<div class="modes" id="modes">
  <button class="mode-btn" id="maskBtn">
    <span>스마트 마스킹<small>소음 스펙트럼을 측정해 맞춤 노이즈로 덮기 · 팬 소음에 효과</small></span>
    <span class="arr">▶</span>
  </button>
  <button class="mode-btn" id="cancelBtn">
    <span>험 상쇄 <small>웅— 하는 저주파를 역위상으로 지우기 · 귀로 2번 탭 (베타)</small></span>
    <span class="arr">▶</span>
  </button>
</div>

<div class="run-btns" id="runBtns">
  <button id="pauseBtn">대기</button>
  <button id="stopBtn">종료</button>
</div>

<button id="demoBtn">🧪 기능테스트 — 가짜 소음으로 상쇄 원리 검증</button>
<div class="err" id="err"></div>

<div class="note">
  <b>원리</b> — iOS는 마이크 사용 중 웹 오디오 출력을 차단하므로, 측정(마이크 3초)과 재생을 시분할합니다. 마이크는 측정 순간에만 켜지고 즉시 해제됩니다.<br>
  <b>마스킹</b>은 팬의 쏴아(광대역)에, <b>험 상쇄</b>는 컴프레서의 웅웅(저주파 주기음)에 효과적입니다. 음량은 측면 볼륨 버튼으로도 조절됩니다. 화면은 켜둔 채 사용하세요. 공유 → "홈 화면에 추가"로 앱처럼 설치할 수 있습니다.
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
